<svg width="300" height="450" viewBox="0 0 300 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2b2b2b"></stop>
      <stop offset="100%" stop-color="#1a1a1a"></stop>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="300" height="450" fill="url(#bg)" rx="12"></rect>

  <!-- film icon (clapperboard stylized) -->
  <g fill="none" stroke="#cccccc" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <!-- top clapper -->
    <rect x="85" y="110" width="130" height="30" fill="none"></rect>
    <path d="M85 110 L215 110 L195 80 L65 80 Z" fill="none"></path>

    <!-- body -->
    <rect x="85" y="140" width="130" height="140"></rect>

    <!-- play icon -->
    <path d="M135 180 L135 240 L185 210 Z" fill="#cccccc" stroke="none"></path>
  </g>

  <!-- text -->
  <text x="150" y="330" text-anchor="middle" fill="#cccccc" font-family="Arial, sans-serif" font-size="18">
    Poster non disponibile
  </text>
</svg>